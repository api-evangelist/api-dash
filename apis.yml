aid: api-dash
name: API Dash
description: >-
  API Dash is a beautiful AI-powered open-source cross-platform API client
  built with Flutter, available on Desktop (macOS, Windows, Linux) and Mobile.
  It provides HTTP and GraphQL request creation, response visualization, folder
  and collection organization, code generation for multiple languages, and
  support for 40+ MIME types including image, audio, and PDF preview. Developed
  by the foss42 organization, API Dash is a lightweight alternative to Postman
  and Insomnia with an active open source community.
