  - type: Features
    data:
      - name: HTTP and GraphQL Support
        description: >-
          Create, customize, and send HTTP and GraphQL API requests with full
          control over headers, parameters, body, and authentication.
      - name: AI-Powered Integration
        description: >-
          AI-powered features help developers work more efficiently with
          API requests, responses, and integration code generation.
      - name: Code Generation
        description: >-
          Generate API integration code in multiple languages including
          JavaScript, Python, Dart, and Kotlin from any request.
      - name: Rich Response Visualization
        description: >-
          Visualize API responses across 40+ MIME types including images,
          audio, PDFs, and JSON with built-in search functionality.
      - name: Collections and Folders
        description: >-
          Organize API requests into folders and collections for structured
          API workflow management.
      - name: Cross-Platform
        description: >-
          Runs natively on macOS, Windows, Linux (Intel/AMD 64-bit and
          ARM 64-bit), with mobile support as well.
  - type: UseCases
    data:
      - name: API Testing
        description: >-
          Test REST and GraphQL APIs with a fully featured desktop client
          as a lightweight alternative to Postman and Insomnia.
      - name: API Integration Development
        description: >-
          Generate boilerplate integration code in multiple languages
          to accelerate API client development.
      - name: API Response Inspection
        description: >-
          Visually inspect and search API responses across many content
          types including JSON, images, and documents.
  - type: Integrations
    data:
      - name: Flutter Ecosystem
        description: >-
          Built with Flutter, API Dash integrates with the Dart/Flutter
          ecosystem and publishes packages to pub.dev.
      - name: OpenAPI
        description: >-
          Import and export OpenAPI specifications for structured API
          request collection management.
  - type: Integrations
    url: https://apidash.dev/integrations
